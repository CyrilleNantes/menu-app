{% extends "menu/base.html" %}

{% block title %}Connexion — Menu Familial{% endblock %}

{% block content %}
<div class="form-page">
    <h1 class="form-page__title">Se connecter</h1>

    {% if error %}
    <div class="message message--error">{{ error }}</div>
    {% endif %}

    <form method="post" class="form-card">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_email">Email</label>
            <input type="email" id="id_email" name="email" autocomplete="email" autofocus
                   value="{{ request.POST.email|default:'' }}">
        </div>

        <div class="form-group">
            <label for="id_password">Mot de passe</label>
            <input type="password" id="id_password" name="password" autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn--primary btn--full">Se connecter</button>
    </form>

    <p class="form-page__alt">Pas encore de compte ? <a href="{% url 'menu:inscription' %}">Créer un compte</a></p>
</div>
{% endblock %}
